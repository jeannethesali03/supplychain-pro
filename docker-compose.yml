# Orquestacion local de SupplyChain Pro
services:
  supplychainpro-db:
    image: mysql:8.0
    env_file:
      - ./.env
    # Credenciales y DB desde .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - supplychain-db-data:/var/lib/mysql
      - ./backend/schema_mysql_simple.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      # Ping simple para confirmar disponibilidad de MySQL
      test:
        ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Sin puertos al host; solo red interna
    networks:
      - supplychain-net

  supplychainpro-backend:
    build: ./backend
    env_file:
      - ./.env
    depends_on:
      supplychainpro-db:
        condition: service_healthy
    environment:
      # Usar nombre de servicio como hostname
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      # Puerto interno del proceso Node dentro del contenedor
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV}
      SIMULATOR_URL: ${SIMULATOR_URL}
    ports:
      # Puerto publicado del host separado del puerto interno de la app
      - "${BACKEND_HOST_PORT:-5001}:5000"
    restart: unless-stopped
    networks:
      - supplychain-net

  supplychainpro-simulator:
    build: ./simulator
    env_file:
      - ./.env
    depends_on:
      supplychainpro-db:
        condition: service_healthy
      supplychainpro-backend:
        condition: service_started
    environment:
      # Usar nombres de servicio en la red
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      BACKEND_URL: ${BACKEND_URL}
      NODE_ENV: ${NODE_ENV}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SIM_STATE_PATH: ${SIM_STATE_PATH}
    volumes:
      - simulator-state:/data
    # Sin puertos al host; simulador interno
    restart: unless-stopped
    networks:
      - supplychain-net

  supplychainpro-phpmyadmin:
    image: phpmyadmin:latest
    env_file:
      - ./.env
    # Cliente web para administrar la DB
    restart: unless-stopped
    depends_on:
      supplychainpro-db:
        condition: service_healthy
    ports:
      # Puerto publicado configurable para evitar conflictos locales
      - "${PHPMYADMIN_HOST_PORT:-8080}:80"
    environment:
      # Conectar al servicio de MySQL interno
      PMA_HOST: supplychainpro-db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    networks:
      - supplychain-net

  supplychainpro-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://supplychainpro-backend:5000/api
    depends_on:
      supplychainpro-backend:
        condition: service_started
    ports:
      - "5173:80"
    restart: unless-stopped
    networks:
      - supplychain-net

volumes:
  supplychain-db-data:
    name: supplychain-db-data
  simulator-state:
    name: simulator-state

networks:
  supplychain-net:
    name: supplychain-net
    driver: bridge
